<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>OwnFormatters Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages & static fallbacks
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      var knownTools = [
        'home', 'json-formatter', 'json-schema-generator', 'jsonpath-tester',
        'yaml-converter', 'xml-formatter', 'sql-formatter', 'code-minifier',
        'api-tester', 'graphql-tester', 'openapi-viewer', 'webhook-tester',
        'mock-api-server', 'docker-compose-validator', 'k8s-yaml-validator',
        'nginx-config-formatter', 'base64-encoder', 'url-encoder', 'jwt-debugger',
        'timestamp-converter', 'text-utility', 'hash-generator', 'uuid-generator',
        'qrcode-generator', 'markdown-editor', 'csv-converter', 'color-converter',
        'number-base-converter', 'cron-parser', 'regex-tester', 'text-diff',
        'privacy-policy', 'terms-of-service', 'about-us'
      ];
      var l = window.location;
      var firstSegment = l.pathname.split('/')[1];
      var pathSegmentsToKeep = (l.hostname.endsWith('.github.io') && knownTools.indexOf(firstSegment) === -1 && firstSegment !== '') ? 1 : 0;
      
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Redirecting you back to the application...
  </body>
</html>
